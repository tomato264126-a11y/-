<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タピオカゲーム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        .rule-summary { font-size: 15px; color: #2c3e50; margin-bottom: 15px; line-height: 1.5; font-weight: bold; }
        #game-container {
            position: relative;
            width: 360px;
            height: 540px;
            background-color: #fff;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .tapioca-label {
            position: absolute;
            width: 80px; 
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 36px; 
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: background-color 0.1s, transform 0.05s;
        }
        .plus { background-color: #4fc3f7; }
        .minus { background-color: #ff8a80; }
        
        #ui-layer {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        #timer { color: #2c3e50; }
        
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 20px;
            z-index: 10;
        }
        #gameover-modal { background-color: rgba(139, 0, 0, 0.85); }
        
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
        button:hover { background-color: #45a049; }
        .sub-btn {
            background-color: #78909c;
            font-size: 14px;
            padding: 6px 12px;
            margin: 5px;
        }
        #reset-btn { background-color: #ff9800; }
    </style>
</head>
<body>

    <h1>タピオカゲーム</h1>
    <div class="rule-summary">
        全部のタピオカを「＋（水色）」にしよう！<br>
        「－」をぶつけると、くっついている「－」がまとめて「＋」に大連鎖するよ！
    </div>

    <div id="game-container">
        <div id="clear-modal" class="modal">
            <h2>🎉 CLEAR !!</h2>
            <p id="final-time"></p>
            <button onclick="resetGame()">もう一度遊ぶ</button>
        </div>
        <div id="gameover-modal" class="modal">
            <h2>⚠️ GAME OVER</h2>
            <p>コップから溢れてしまった！</p>
            <button onclick="resetGame()">リトライ</button>
        </div>
    </div>

    <div id="ui-layer">
        タイム: <span id="timer">0.0</span> 秒<br>
        <button class="sub-btn" id="sound-btn" onclick="toggleMute()">🎵 BGM: ON</button>
        <button class="sub-btn" id="reset-btn" onclick="resetGame()">🔄 最初からリセット</button>
    </div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Events, Pair } = Matter;

const container = document.getElementById('game-container');
const timerEl = document.getElementById('timer');
const clearModal = document.getElementById('clear-modal');
const gameoverModal = document.getElementById('gameover-modal');
const finalTimeEl = document.getElementById('final-time');

let engine, render, runner;
let currentBody = null;
let currentLabel = null;
let list = []; 
let gameActive = false;
let startTime = null;
let timerInterval = null;

let audioCtx = null;
let isMuted = false;
let bgmInterval = null;

const WIDTH = 360;
const HEIGHT = 540;
const TAPI_RADIUS = 40; 
const CUP_X = WIDTH / 2;
const CUP_Y = HEIGHT - 15;
const CUP_W = 280;
const CUP_H = 340;
const WALL_THICK = 12;
const DEADLINE_Y = HEIGHT - CUP_H + 20; 

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startBGM();
    }
}

function playSound(freq, type, duration) {
    if (isMuted || !audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
    } catch(e) {}
}

function startBGM() {
    if (bgmInterval) clearInterval(bgmInterval);
    let notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66];
    let step = 0;
    bgmInterval = setInterval(() => {
        if (gameActive && !isMuted) {
            playSound(notes[step % notes.length], 'triangle', 0.18);
            step++;
        }
    }, 400);
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('sound-btn').innerText = isMuted ? "🔇 BGM: OFF" : "🎵 BGM: ON";
    initAudio();
}

function initGame() {
    const oldCanvas = container.querySelector('canvas');
    if (oldCanvas) oldCanvas.remove();
    document.querySelectorAll('.tapioca-label').forEach(el => el.remove());
    
    clearModal.style.display = 'none';
    gameoverModal.style.display = 'none';
    list = [];
    currentBody = null;
    currentLabel = null;

    engine = Engine.create({ gravity: { y: 1.4 } });
    render = Render.create({
        element: container,
        engine: engine,
        options: { width: WIDTH, height: HEIGHT, wireframes: false, background: '#f5f7fa' }
    });
    Render.run(render);
    runner = Runner.create();
    Runner.run(runner, engine);

    const leftWall = Bodies.rectangle(CUP_X - CUP_W/2, CUP_Y - CUP_H/2, WALL_THICK, CUP_H, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    const rightWall = Bodies.rectangle(CUP_X + CUP_W/2, CUP_Y - CUP_H/2, WALL_THICK, CUP_H, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    const bottomWall = Bodies.rectangle(CUP_X, CUP_Y, CUP_W + WALL_THICK, WALL_THICK, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    Composite.add(engine.world, [leftWall, rightWall, bottomWall]);

    const spawnPositions = [
        { x: CUP_X - 70, y: CUP_Y - TAPI_RADIUS - 15 },
        { x: CUP_X,      y: CUP_Y - TAPI_RADIUS - 15 },
        { x: CUP_X + 70, y: CUP_Y - TAPI_RADIUS - 15 }
    ];

    for (let i = 0; i < 3; i++) {
        let sign = Math.random() > 0.65 ? '－' : '＋';
        if(i === 1 && !list.some(item => item.body.plugin.sign === '－')) sign = '－';
        createTapioca(spawnPositions[i].x, spawnPositions[i].y, sign, false);
    }

    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.4)';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(CUP_X - CUP_W/2, DEADLINE_Y);
        ctx.lineTo(CUP_X + CUP_W/2, DEADLINE_Y);
        ctx.stroke();
        ctx.setLineDash([]);
    });

    Events.on(engine, 'collisionStart', handleCollisions);
    Events.on(engine, 'afterUpdate', updateLabels);

    gameActive = true;
    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 100);

    spawnNext();

    container.addEventListener('touchstart', handleTouch, {passive: false});
    container.addEventListener('touchmove', handleTouch, {passive: false});
    container.addEventListener('touchend', handleTouchEnd, {passive: false});
    container.addEventListener('mousedown', handleMouse);
    container.addEventListener('mousemove', handleMouse);
    container.addEventListener('mouseup', handleMouseUp);
}

function createTapioca(x, y, sign, isStatic = false) {
    const body = Bodies.circle(x, y, TAPI_RADIUS, {
        isStatic: isStatic,
        restitution: 0.2, 
        friction: 0.02,
        render: { visible: false }
    });
    
    const label = document.createElement('div');
    label.className = `tapioca-label ${sign === '＋' ? 'plus' : 'minus'}`;
    label.innerText = sign;
    container.appendChild(label);
    
    body.plugin = { sign: sign, hasLanded: !isStatic, id: Math.random() };
    Composite.add(engine.world, body);
    
    const item = { body, label };
    if (!isStatic) list.push(item);
    
    label.style.left = `${x}px`;
    label.style.top = `${y}px`;
    
    return item;
}

function spawnNext() {
    if (!gameActive) return;
    const sign = Math.random() > 0.45 ? '－' : '＋';
    const next = createTapioca(WIDTH / 2, 50, sign, true);
    currentBody = next.body;
    currentLabel = next.label;
}

function moveCurrent(clientX) {
    if (!currentBody || !gameActive) return;
    let rect = container.getBoundingClientRect();
    let x = clientX - rect.left;
    
    const minX = CUP_X - CUP_W/2 + TAPI_RADIUS + WALL_THICK/2;
    const maxX = CUP_X + CUP_W/2 - TAPI_RADIUS - WALL_THICK/2;
    if (x < minX) x = minX;
    if (x > maxX) x = maxX;
    
    Body.setPosition(currentBody, { x: x, y: 50 });
    currentLabel.style.left = `${x}px`;
    currentLabel.style.top = `50px`;
}

function dropCurrent() {
    if (!currentBody || !gameActive) return;
    initAudio();
    
    Body.setStatic(currentBody, false);
    currentBody.plugin.hasLanded = true;
    list.push({ body: currentBody, label: currentLabel });
    
    playSound(440, 'square', 0.05);
    currentBody = null;
    currentLabel = null;
    
    setTimeout(() => {
        if(gameActive) {
            checkGameOver();
            if(gameActive) spawnNext();
        }
    }, 1000);
}

let isMouseDown = false;
function handleMouse(e) { e.preventDefault(); if(e.type==='mousedown') isMouseDown = true; if(isMouseDown) moveCurrent(e.clientX); }
function handleMouseUp() { if(isMouseDown) { isMouseDown = false; dropCurrent(); } }
function handleTouch(e) { e.preventDefault(); moveCurrent(e.touches[0].clientX); }
function handleTouchEnd(e) { e.preventDefault(); dropCurrent(); }

function updateLabels() {
    list.forEach(item => {
        item.label.style.left = `${item.body.position.x}px`;
        item.label.style.top = `${item.body.position.y}px`;
        item.label.style.transform = `translate(-50%, -50%) rotate(${item.body.angle}rad)`;
    });
}

// 【大改良】つながっているマイナスを一網打尽にする連鎖処理システム
function handleCollisions(event) {
    if (!gameActive) return;
    
    let triggerChain = false;
    
    // 今回の衝突で「マイナス同士」または「マイナスとプラス」が衝突したか確認
    event.pairs.forEach(pair => {
        const bodyA = pair.bodyA;
        const bodyB = pair.bodyB;
        
        if (bodyA.plugin && bodyB.plugin && bodyA.plugin.hasLanded && bodyB.plugin.hasLanded) {
            // どちらか一方でもマイナスが含まれる衝突が起きたら、連鎖の引き金にする
            if (bodyA.plugin.sign === '－' || bodyB.plugin.sign === '－') {
                triggerChain = true;
            }
        }
    });
    
    // 連鎖の引き金が引かれたら、現在「接触しているグループ」をすべて解析する
    if (triggerChain) {
        // 現在世界に存在するすべての接触ペアを取得
        const allPairs = engine.pairs.list;
        
        // 各タピオカが「現在誰と接触しているか」の繋がりマップ（隣接リスト）を作る
        let graph = {};
        list.forEach(item => { graph[item.body.plugin.id] = []; });
        
        allPairs.forEach(pair => {
            if (pair.bodyA.plugin && pair.bodyB.plugin) {
                const idA = pair.bodyA.plugin.id;
                const idB = pair.bodyB.plugin.id;
                if (graph[idA] && graph[idB]) {
                    graph[idA].push(pair.bodyB);
                    graph[idB].push(pair.bodyA);
                }
            }
        });

        // 変化させるべきIDを記録するセット
        let flippedIds = new Set();
        let visited = new Set();

        // 探索アルゴリズム（くっついているマイナスを芋づる式に見つける）
        function dfs(body, shouldFlipNext) {
            if (visited.has(body.plugin.id)) return;
            visited.add(body.plugin.id);

            let currentSign = body.plugin.sign;
            // 前のタピオカがマイナスで、自分にエネルギーが回ってきたらひっくり返す
            if (shouldFlipNext) {
                body.plugin.newSign = (currentSign === '＋') ? '－' : '＋';
                flippedIds.add(body.plugin.id);
            } else {
                body.plugin.newSign = currentSign;
            }

            // 隣接する（くっついている）タピオカへエネルギーを伝播
            let neighbors = graph[body.plugin.id] || [];
            neighbors.forEach(neighbor => {
                // 自分が「元々マイナス」だった場合、隣のやつをひっくり返すエネルギー（連鎖）が発生する
                let nextFlip = (currentSign === '－');
                dfs(neighbor, nextFlip);
            });
        }

        // すべてのタピオカから探索を開始
        list.forEach(item => {
            if (!visited.has(item.body.plugin.id)) {
                dfs(item.body, false);
            }
        });

        // 実際に符号を更新して画面に反映
        if (flippedIds.size > 0) {
            playSound(587.33, 'sine', 0.08); 
            list.forEach(item => {
                if (item.body.plugin.newSign) {
                    item.body.plugin.sign = item.body.plugin.newSign;
                    item.label.className = `tapioca-label ${item.body.plugin.sign === '＋' ? 'plus' : 'minus'}`;
                    item.label.innerText = item.body.plugin.sign;
                    delete item.body.plugin.newSign;
                }
            });
            
            // 連鎖演出が落ち着いた頃にクリアチェック
            setTimeout(checkClear, 300);
        }
    }
}

function updateTimer() {
    let elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    timerEl.innerText = elapsed;
}

function checkClear() {
    if (list.length === 0) return;
    const allPlus = list.every(item => item.body.plugin.sign === '＋');
    if (allPlus) {
        gameActive = false;
        clearInterval(timerInterval);
        playSound(880, 'sine', 0.1);
        setTimeout(() => playSound(1318.51, 'sine', 0.3), 100);
        clearModal.style.display = 'flex';
        finalTimeEl.innerText = `タイム: ${timerEl.innerText} 秒`;
    }
}

function checkGameOver() {
    let overflow = list.some(item => item.body.position.y < DEADLINE_Y && item.body.velocity.y < 0.1);
    if (overflow) {
        gameActive = false;
        clearInterval(timerInterval);
        playSound(150, 'sawtooth', 0.5);
        gameoverModal.style.display = 'flex';
    }
}

function resetGame() {
    if (engine) {
        Engine.clear(engine);
        Runner.stop(runner);
    }
    initGame();
}

initGame();
</script>

</body>
</html>
