<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タピオカゲーム</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        .rule-summary { font-size: 14px; color: #555; margin-bottom: 15px; }
        #game-container {
            position: relative;
            width: 360px;
            height: 500px;
            background-color: #fff;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            touch-action: none;
        }
        #cup {
            position: absolute;
            bottom: 20px;
            left: 50px;
            width: 260px;
            height: 320px;
            border: 8px solid #ddd;
            border-top: none;
            border-radius: 0 0 30px 30px;
            background-color: rgba(255,255,255,0.6);
        }
        /* ゲームオーバーのライン（コップの淵） */
        #dead-line {
            position: absolute;
            bottom: 340px;
            left: 50px;
            width: 260px;
            height: 2px;
            background-color: rgba(255, 0, 0, 0.4);
            border-dash: 4px;
        }
        .tapioca {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .plus { background-color: #4fc3f7; }
        .minus { background-color: #ff8a80; }
        
        #ui-layer {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        #timer { color: #2c3e50; }
        
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 20px;
            z-index: 10;
        }
        #gameover-modal { background-color: rgba(139, 0, 0, 0.85); }
        
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
        button:hover { background-color: #45a049; }
        #sound-btn {
            background-color: #78909c;
            margin-top: 5px;
            font-size: 14px;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <h1>タピオカゲーム</h1>
    <div class="rule-summary">
        全部のタピオカを「＋（水色）」にしよう！<br>
        マイナス同士をぶつけるとプラスに大反転！
    </div>

    <div id="game-container">
        <div id="cup"></div>
        <div id="dead-line"></div>
        
        <div id="clear-modal" class="modal">
            <h2>🎉 CLEAR !!</h2>
            <p id="final-time"></p>
            <button onclick="resetGame()">もう一度遊ぶ</button>
        </div>

        <div id="gameover-modal" class="modal">
            <h2>⚠️ GAME OVER</h2>
            <p>コップから溢れてしまった！</p>
            <button onclick="resetGame()">リトライ</button>
        </div>
    </div>

    <div id="ui-layer">
        タイム: <span id="timer">0.0</span> 秒<br>
        <button id="sound-btn" onclick="toggleMute()">🎵 BGM: ON</button>
    </div>

<script>
const container = document.getElementById('game-container');
const cup = document.getElementById('cup');
const timerEl = document.getElementById('timer');
const clearModal = document.getElementById('clear-modal');
const gameoverModal = document.getElementById('gameover-modal');
const finalTimeEl = document.getElementById('final-time');

let cupTapis = [];
let currentTapi = null;
let isDragging = false;
let startTime = null;
let timerInterval = null;
let gameActive = false;

// サウンド設定
let audioCtx = null;
let isMuted = false;
let bgmInterval = null;

// ルール設定
const TAPI_SIZE = 40;
const CUP_LEFT = 50 + 8;
const CUP_RIGHT = 50 + 260 - 8 - TAPI_SIZE;
const CUP_BOTTOM = 500 - 20 - 8 - TAPI_SIZE;
const CUP_DEADLINE = 500 - 340; // 溢れ判定のY座標

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startBGM();
    }
}

// サウンド生成関数
function playSound(freq, type, duration) {
    if (isMuted || !audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

// かわいいピコピコBGMをループ再生
function startBGM() {
    if (bgmInterval) clearInterval(bgmInterval);
    let notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66]; // ドレミファソファミレ
    let step = 0;
    bgmInterval = setInterval(() => {
        if (gameActive && !isMuted) {
            playSound(notes[step % notes.length], 'triangle', 0.2);
            step++;
        }
    }, 400);
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('sound-btn').innerText = isMuted ? "🔇 BGM: OFF" : "🎵 BGM: ON";
    initAudio();
}

function initGame() {
    cup.innerHTML = '';
    cupTapis = [];
    clearModal.style.display = 'none';
    gameoverModal.style.display = 'none';
    
    // コップの中に初期タピオカを配置（4個、少し優しめに）
    for(let i=0; i<4; i++) {
        let sign = Math.random() > 0.5 ? '＋' : '－';
        let x = CUP_LEFT + (i * 55) + Math.random()*10;
        if (x > CUP_RIGHT) x = CUP_RIGHT;
        let y = CUP_BOTTOM;
        createCupTapioca(x, y, sign);
    }
    
    gameActive = true;
    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 100);
    
    spawnNextTapioca();
}

function createCupTapioca(x, y, sign) {
    const el = document.createElement('div');
    el.className = `tapioca ${sign === '＋' ? 'plus' : 'minus'}`;
    el.innerText = sign;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    container.appendChild(el);
    cupTapis.push({ el, x, y, sign });
}

function spawnNextTapioca() {
    if (!gameActive) return;
    
    const sign = Math.random() > 0.4 ? '－' : '＋';
    currentTapi = document.createElement('div');
    currentTapi.className = `tapioca ${sign === '＋' ? 'plus' : 'minus'}`;
    currentTapi.innerText = sign;
    
    let x = 160;
    let y = 40;
    currentTapi.style.left = `${x}px`;
    currentTapi.style.top = `${y}px`;
    container.appendChild(currentTapi);
    
    currentTapi.addEventListener('mousedown', startDrag);
    currentTapi.addEventListener('touchstart', startDrag, {passive: false});
}

function startDrag(e) {
    if(!gameActive) return;
    initAudio(); // ユーザーのアクションでオーディオを起動
    isDragging = true;
    moveDrag(e);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('touchmove', moveDrag, {passive: false});
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);
}

function moveDrag(e) {
    if(!isDragging) return;
    e.preventDefault();
    let clientX = e.clientX || (e.touches && e.touches[0].clientX);
    let rect = container.getBoundingClientRect();
    let x = clientX - rect.left - TAPI_SIZE/2;
    if(x < CUP_LEFT) x = CUP_LEFT;
    if(x > CUP_RIGHT) x = CUP_RIGHT;
    currentTapi.style.left = `${x}px`;
}

function endDrag() {
    if(!isDragging) return;
    isDragging = false;
    window.removeEventListener('mousemove', moveDrag);
    window.removeEventListener('touchmove', moveDrag);
    window.removeEventListener('mouseup', endDrag);
    window.removeEventListener('touchend', endDrag);
    
    playSound(440, 'square', 0.05); // ポトッという音
    dropTapioca();
}

// 落下と転がりの処理
function dropTapioca() {
    let x = parseFloat(currentTapi.style.left);
    let y = parseFloat(currentTapi.style.top);
    
    let dropInterval = setInterval(() => {
        y += 10; // 落下速度
        currentTapi.style.top = `${y}px`;
        
        let hitTapi = null;
        // 衝突判定
        for(let tapi of cupTapis) {
            let dist = Math.hypot((x - tapi.x), (y - tapi.y));
            if(dist < TAPI_SIZE - 2) {
                hitTapi = tapi;
                break;
            }
        }
        
        // 底に着いたか、他のタピオカにぶつかったら停止して転がり判定へ
        if(y >= CUP_BOTTOM || hitTapi) {
            clearInterval(dropInterval);
            
            if (y >= CUP_BOTTOM) {
                y = CUP_BOTTOM;
                currentTapi.style.top = `${y}px`;
                landTapioca(x, y);
            } else {
                // コロコロ転がる処理（ぶつかった相手の左右どちらにずれているか）
                let diffX = x - hitTapi.x;
                let rollX = diffX > 0 ? 15 : -15; // 左右にずらす
                
                // コップの壁を突き抜けないように制限
                let nextX = x + rollX;
                if(nextX < CUP_LEFT) nextX = CUP_LEFT;
                if(nextX > CUP_RIGHT) nextX = CUP_RIGHT;
                
                x = nextX;
                y = hitTapi.y - TAPI_SIZE + 8; // 少しめり込みつつ上に乗せる
                currentTapi.style.left = `${x}px`;
                currentTapi.style.top = `${y}px`;
                
                // 転がった先でさらに下がないか再確認し、着地
                landTapioca(x, y);
            }
        }
    }, 12);
}

// 着地後の処理（符号反転、クリア・ゲームオーバー判定）
function landTapioca(x, y) {
    let mySign = currentTapi.innerText;
    let hitTapis = [];
    
    // 周囲にあるタピオカを探す
    for(let tapi of cupTapis) {
        let dist = Math.hypot((x - tapi.x), (y - tapi.y));
        if(dist < TAPI_SIZE + 10) {
            hitTapis.push(tapi);
        }
    }
    
    if(hitTapis.length > 0) {
        let minusCount = (mySign === '－' ? 1 : 0);
        hitTapis.forEach(t => { if(t.sign === '－') minusCount++; });
        let newSign = (minusCount % 2 === 1) ? '－' : '＋';
        
        // 符号が実際に変わったかチェックして効果音を変える
        let changed = (mySign !== newSign) || hitTapis.some(t => t.sign !== newSign);
        
        mySign = newSign;
        updateSign(currentTapi, newSign);
        hitTapis.forEach(t => {
            t.sign = newSign;
            updateSign(t.el, newSign);
        });
        
        if (changed) {
            playSound(600, 'sine', 0.15); // ピキーン（反転音）
            // 連鎖感を出すためのアニメーション
            currentTapi.style.transform = "scale(1.2)";
            setTimeout(() => currentTapi.style.transform = "scale(1)", 150);
        }
    }
    
    cupTapis.push({ el: currentTapi, x, y, sign: mySign });
    currentTapi = null;
    
    // ゲームオーバー判定（デッドラインを超えたか）
    if (y < CUP_DEADLINE) {
        gameOver();
        return;
    }
    
    checkClear();
    if(gameActive) spawnNextTapioca();
}

function updateSign(element, sign) {
    element.innerText = sign;
    element.className = `tapioca ${sign === '＋' ? 'plus' : 'minus'}`;
}

function updateTimer() {
    let elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    timerEl.innerText = elapsed;
}

function checkClear() {
    const allPlus = cupTapis.every(t => t.sign === '＋');
    if(allPlus && cupTapis.length > 0) {
        gameActive = false;
        clearInterval(timerInterval);
        playSound(880, 'sine', 0.1);
        setTimeout(() => playSound(1318.51, 'sine', 0.3), 100); // ファンファーレ音
        clearModal.style.display = 'flex';
        finalTimeEl.innerText = `タイム: ${timerEl.innerText} 秒`;
    }
}

function gameOver() {
    gameActive = false;
    clearInterval(timerInterval);
    playSound(150, 'sawtooth', 0.5); // ブーという音
    gameoverModal.style.display = 'flex';
}

function resetGame() {
    const tapis = document.querySelectorAll('.tapioca');
    tapis.forEach(t => t.remove());
    initGame();
}

// ゲームスタート
initGame();
</script>

</body>
</html>
