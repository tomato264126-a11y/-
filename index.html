<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タピオカパズル</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        .rule-summary { font-size: 14px; color: #2c3e50; margin-bottom: 15px; line-height: 1.5; font-weight: bold; }
        #game-container {
            position: relative;
            width: 360px;
            height: 540px;
            background-color: #fff;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .tapioca-label {
            position: absolute;
            width: 80px; 
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 36px; 
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: background-color 0.1s, transform 0.05s;
        }
        .plus { background-color: #4fc3f7; }
        .minus { background-color: #ff8a80; }
        
        #ui-layer {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
        #score { color: #e91e63; font-size: 24px; }
        
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 20px;
            z-index: 10;
        }
        #gameover-modal { background-color: rgba(44, 62, 80, 0.9); }
        
        button {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background-color: #e91e63;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover { background-color: #c2185b; }
        .sub-btn {
            background-color: #78909c;
            font-size: 14px;
            padding: 6px 12px;
            margin: 5px;
            box-shadow: none;
        }
        #reset-btn { background-color: #ff9800; }
    </style>
</head>
<body>

    <h1>タピオカパズル</h1>
    <div class="rule-summary">
        赤い線をこえるまでに「＋（水色）」をたくさん作ろう！<br>
        「－」に直接触れたタピオカは、同時に何個でも一緒に反転するよ！
    </div>

    <div id="game-container">
        <div id="gameover-modal" class="modal">
            <h2>📊 GAME OVER</h2>
            <p>コップからタピオカが溢れました！</p>
            <p style="font-size: 24px; font-weight: bold; color: #ffeb3b;" id="final-score"></p>
            <button onclick="resetGame()">もう一度挑戦する</button>
        </div>
    </div>

    <div id="ui-layer">
        現在のスコア: <span id="score">0</span> 点<br>
        <button class="sub-btn" id="sound-btn" onclick="toggleMute()">🎵 BGM: ON</button>
        <button class="sub-btn" id="reset-btn" onclick="resetGame()">🔄 スコアをリセット</button>
    </div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;

const container = document.getElementById('game-container');
const scoreEl = document.getElementById('score');
const gameoverModal = document.getElementById('gameover-modal');
const finalScoreEl = document.getElementById('final-score');

let engine, render, runner;
let currentBody = null;
let currentLabel = null;
let list = []; 
let gameActive = false;
let score = 0;

let audioCtx = null;
let isMuted = false;
let bgmInterval = null;

const WIDTH = 360;
const HEIGHT = 540;
const TAPI_RADIUS = 40; 
const CUP_X = WIDTH / 2;
const CUP_Y = HEIGHT - 15;
const CUP_W = 280;
const CUP_H = 340;
const WALL_THICK = 12;
const DEADLINE_Y = HEIGHT - CUP_H + 20; 

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startBGM();
    }
}

function playSound(freq, type, duration) {
    if (isMuted || !audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
    } catch(e) {}
}

function startBGM() {
    if (bgmInterval) clearInterval(bgmInterval);
    let notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66];
    let step = 0;
    bgmInterval = setInterval(() => {
        if (gameActive && !isMuted) {
            playSound(notes[step % notes.length], 'triangle', 0.18);
            step++;
        }
    }, 400);
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('sound-btn').innerText = isMuted ? "🔇 BGM: OFF" : "🎵 BGM: ON";
    initAudio();
}

function initGame() {
    const oldCanvas = container.querySelector('canvas');
    if (oldCanvas) oldCanvas.remove();
    document.querySelectorAll('.tapioca-label').forEach(el => el.remove());
    
    gameoverModal.style.display = 'none';
    list = [];
    currentBody = null;
    currentLabel = null;
    score = 0;
    scoreEl.innerText = score;

    engine = Engine.create({ gravity: { y: 1.4 } });
    render = Render.create({
        element: container,
        engine: engine,
        options: { width: WIDTH, height: HEIGHT, wireframes: false, background: '#f5f7fa' }
    });
    Render.run(render);
    runner = Runner.create();
    Runner.run(runner, engine);

    const leftWall = Bodies.rectangle(CUP_X - CUP_W/2, CUP_Y - CUP_H/2, WALL_THICK, CUP_H, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    const rightWall = Bodies.rectangle(CUP_X + CUP_W/2, CUP_Y - CUP_H/2, WALL_THICK, CUP_H, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    const bottomWall = Bodies.rectangle(CUP_X, CUP_Y, CUP_W + WALL_THICK, WALL_THICK, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    Composite.add(engine.world, [leftWall, rightWall, bottomWall]);

    const spawnPositions = [
        { x: CUP_X - 70, y: CUP_Y - TAPI_RADIUS - 15 },
        { x: CUP_X,      y: CUP_Y - TAPI_RADIUS - 15 },
        { x: CUP_X + 70, y: CUP_Y - TAPI_RADIUS - 15 }
    ];

    for (let i = 0; i < 3; i++) {
        let sign = Math.random() > 0.5 ? '－' : '＋';
        createTapioca(spawnPositions[i].x, spawnPositions[i].y, sign, false);
    }

    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.6)';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(CUP_X - CUP_W/2, DEADLINE_Y);
        ctx.lineTo(CUP_X + CUP_W/2, DEADLINE_Y);
        ctx.stroke();
        ctx.setLineDash([]);
    });

    Events.on(engine, 'collisionStart', handleCollisions);
    Events.on(engine, 'afterUpdate', updateLabels);

    gameActive = true;
    spawnNext();

    container.addEventListener('touchstart', handleTouch, {passive: false});
    container.addEventListener('touchmove', handleTouch, {passive: false});
    container.addEventListener('touchend', handleTouchEnd, {passive: false});
    container.addEventListener('mousedown', handleMouse);
    container.addEventListener('mousemove', handleMouse);
    container.addEventListener('mouseup', handleMouseUp);
}

function createTapioca(x, y, sign, isStatic = false) {
    const body = Bodies.circle(x, y, TAPI_RADIUS, {
        isStatic: isStatic,
        restitution: 0.2, 
        friction: 0.02,
        render: { visible: false }
    });
    
    const label = document.createElement('div');
    label.className = `tapioca-label ${sign === '＋' ? 'plus' : 'minus'}`;
    label.innerText = sign;
    container.appendChild(label);
    
    body.plugin = { sign: sign, id: Math.random() };
    Composite.add(engine.world, body);
    
    const item = { body, label };
    if (!isStatic) {
        list.push(item);
        if (sign === '＋') {
            score += 10;
            scoreEl.innerText = score;
        }
    }
    
    label.style.left = `${x}px`;
    label.style.top = `${y}px`;
    
    return item;
}

function spawnNext() {
    if (!gameActive) return;
    const sign = Math.random() > 0.45 ? '－' : '＋';
    const next = createTapioca(WIDTH / 2, 50, sign, true);
    currentBody = next.body;
    currentLabel = next.label;
}

function moveCurrent(clientX) {
    if (!currentBody || !gameActive) return;
    let rect = container.getBoundingClientRect();
    let x = clientX - rect.left;
    
    const minX = CUP_X - CUP_W/2 + TAPI_RADIUS + WALL_THICK/2;
    const maxX = CUP_X + CUP_W/2 - TAPI_RADIUS - WALL_THICK/2;
    if (x < minX) x = minX;
    if (x > maxX) x = maxX;
    
    Body.setPosition(currentBody, { x: x, y: 50 });
    currentLabel.style.left = `${x}px`;
    currentLabel.style.top = `50px`;
}

function dropCurrent() {
    if (!currentBody || !gameActive) return;
    initAudio();
    
    Body.setStatic(currentBody, false);
    list.push({ body: currentBody, label: currentLabel });
    
    if (currentBody.plugin.sign === '＋') {
        score += 10;
        scoreEl.innerText = score;
    }
    
    playSound(440, 'square', 0.05);
    currentBody = null;
    currentLabel = null;
    
    setTimeout(() => {
        if(gameActive) {
            checkGameOver();
            if(gameActive) spawnNext();
        }
    }, 1000);
}

let isMouseDown = false;
function handleMouse(e) { e.preventDefault(); if(e.type==='mousedown') isMouseDown = true; if(isMouseDown) moveCurrent(e.clientX); }
function handleMouseUp() { if(isMouseDown) { isMouseDown = false; dropCurrent(); } }
function handleTouch(e) { e.preventDefault(); moveCurrent(e.touches[0].clientX); }
function handleTouchEnd(e) { e.preventDefault(); dropCurrent(); }

function updateLabels() {
    list.forEach(item => {
        item.label.style.left = `${item.body.position.x}px`;
        item.label.style.top = `${item.body.position.y}px`;
        item.label.style.transform = `translate(-50%, -50%) rotate(${item.body.angle}rad)`;
    });
}

// 【同時衝突対応版】接触した全てのタピオカをフラットに反転させるロジック
function handleCollisions(event) {
    if (!gameActive) return;
    
    // このフレーム内で「反転させるべきタピオカのID」を管理するオブジェクト
    let targetFlips = {};

    event.pairs.forEach(pair => {
        const bodyA = pair.bodyA;
        const bodyB = pair.bodyB;
        
        // 両方がタピオカである場合
        if (bodyA.plugin && bodyB.plugin) {
            let signA = bodyA.plugin.sign;
            let signB = bodyB.plugin.sign;
            
            // どちらか一方でもマイナスが含まれる衝突なら、お互いに反転フラグを立てる
            if (signA === '－' || signB === '－') {
                targetFlips[bodyA.plugin.id] = (targetFlips[bodyA.plugin.id] || bodyA.plugin.sign) === '＋' ? '－' : '＋';
                targetFlips[bodyB.plugin.id] = (targetFlips[bodyB.plugin.id] || bodyB.plugin.sign) === '＋' ? '－' : '＋';
            }
        }
    });
    
    // 集計された反転対象を一斉に適用
    let updated = false;
    Object.keys(targetFlips).forEach(id => {
        const item = list.find(t => t.body.plugin.id == id);
        if (item) {
            let oldSign = item.body.plugin.sign;
            let newSign = targetFlips[id];
            
            if (oldSign !== newSign) {
                item.body.plugin.sign = newSign;
                item.label.className = `tapioca-label ${newSign === '＋' ? 'plus' : 'minus'}`;
                item.label.innerText = newSign;
                
                // スコアのリアルタイム増減
                if (oldSign === '－' && newSign === '＋') {
                    score += 10;
                } else if (oldSign === '＋' && newSign === '－') {
                    score = Math.max(0, score - 10);
                }
                updated = true;
            }
        }
    });

    if (updated) {
        playSound(587.33, 'sine', 0.08); 
        scoreEl.innerText = score;
    }
}

function checkGameOver() {
    let overflow = list.some(item => item.body.position.y < DEADLINE_Y && item.body.velocity.y < 0.1);
    if (overflow) {
        gameActive = false;
        playSound(150, 'sawtooth', 0.5);
        gameoverModal.style.display = 'flex';
        finalScoreEl.innerText = `あなたの記録: ${score} 点`;
    }
}

function resetGame() {
    if (engine) {
        Engine.clear(engine);
        Runner.stop(runner);
    }
    initGame();
}

initGame();
</script>

</body>
</html>
