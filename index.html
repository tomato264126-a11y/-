<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タピオカゲーム</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        .rule-summary { font-size: 14px; color: #555; margin-bottom: 15px; }
        #game-container {
            position: relative;
            width: 360px;
            height: 520px;
            background-color: #fff;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            touch-action: none;
        }
        /* 物理エンジンの描画キャンバス */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        #timer { color: #2c3e50; }
        
        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 20px;
            z-index: 10;
        }
        #gameover-modal { background-color: rgba(139, 0, 0, 0.85); }
        
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            background-color: #4caf50;
            color: white;
            cursor: pointer;
        }
        button:hover { background-color: #45a049; }
        .sub-btn {
            background-color: #78909c;
            font-size: 14px;
            padding: 6px 12px;
            margin: 5px;
        }
        .sub-btn:hover { background-color: #607d8b; }
        #reset-btn { background-color: #ff9800; }
        #reset-btn:hover { background-color: #f57c00; }
    </style>
</head>
<body>

    <h1>タピオカゲーム</h1>
    <div class="rule-summary">
        全部のタピオカを「＋（水色）」にしよう！<br>
        上から落として、コップのタピオカを上手に動かそう！
    </div>

    <div id="game-container">
        <div id="clear-modal" class="modal">
            <h2>🎉 CLEAR !!</h2>
            <p id="final-time"></p>
            <button onclick="resetGame()">もう一度遊ぶ</button>
        </div>

        <div id="gameover-modal" class="modal">
            <h2>⚠️ GAME OVER</h2>
            <p>コップから溢れてしまった！</p>
            <button onclick="resetGame()">リトライ</button>
        </div>
    </div>

    <div id="ui-layer">
        タイム: <span id="timer">0.0</span> 秒<br>
        <button class="sub-btn" id="sound-btn" onclick="toggleMute()">🎵 BGM: ON</button>
        <button class="sub-btn" id="reset-btn" onclick="resetGame()">🔄 最初からリセット</button>
    </div>

<script>
// Matter.js のモジュールを取り込み
const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;

const container = document.getElementById('game-container');
const timerEl = document.getElementById('timer');
const clearModal = document.getElementById('clear-modal');
const gameoverModal = document.getElementById('gameover-modal');
const finalTimeEl = document.getElementById('final-time');

let engine, render, runner;
let currentTapioca = null;
let spawnedTapiocas = [];
let gameActive = false;
let startTime = null;
let timerInterval = null;

// オーディオ設定
let audioCtx = null;
let isMuted = false;
let bgmInterval = null;

// 定数設定
const WIDTH = 360;
const HEIGHT = 520;
const TAPI_RADIUS = 20; // 直径40
const CUP_X = WIDTH / 2;
const CUP_Y = HEIGHT - 20;
const CUP_W = 260;
const CUP_H = 320;
const WALL_THICK = 12;
const DEADLINE_Y = HEIGHT - CUP_H - 10; // コップの上の溢れライン

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startBGM();
    }
}

function playSound(freq, type, duration) {
    if (isMuted || !audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function startBGM() {
    if (bgmInterval) clearInterval(bgmInterval);
    let notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66];
    let step = 0;
    bgmInterval = setInterval(() => {
        if (gameActive && !isMuted) {
            playSound(notes[step % notes.length], 'triangle', 0.2);
            step++;
        }
    }, 400);
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('sound-btn').innerText = isMuted ? "🔇 BGM: OFF" : "🎵 BGM: ON";
    initAudio();
}

// ゲームの立ち上げ
function initGame() {
    // 古いキャンバスがあれば削除
    const oldCanvas = container.querySelector('canvas');
    if (oldCanvas) oldCanvas.remove();

    clearModal.style.display = 'none';
    gameoverModal.style.display = 'none';
    spawnedTapiocas = [];
    currentTapioca = null;

    // 1. 物理エンジン・レンダラーの生成
    engine = Engine.create({ gravity: { y: 1.2 } });
    render = Render.create({
        element: container,
        engine: engine,
        options: {
            width: WIDTH,
            height: HEIGHT,
            wireframes: false,
            background: '#ffffff'
        }
    });
    Render.run(render);
    runner = Runner.create();
    Runner.run(runner, engine);

    // 2. コップ（壁）の作成
    const leftWall = Bodies.rectangle(CUP_X - CUP_W/2, CUP_Y - CUP_H/2, WALL_THICK, CUP_H, { isStatic: true, render: { fillStyle: '#ddd' } });
    const rightWall = Bodies.rectangle(CUP_X + CUP_W/2, CUP_Y - CUP_H/2, WALL_THICK, CUP_H, { isStatic: true, render: { fillStyle: '#ddd' } });
    const bottomWall = Bodies.rectangle(CUP_X, CUP_Y, CUP_W + WALL_THICK, WALL_THICK, { isStatic: true, render: { fillStyle: '#ddd' } });
    Composite.add(engine.world, [leftWall, rightWall, bottomWall]);

    // 3. 初期タピオカの配置（コップの底に6個ランダム配置）
    for (let i = 0; i < 6; i++) {
        let sign = Math.random() > 0.5 ? '＋' : '－';
        let rx = CUP_X - CUP_W/3 + Math.random() * (CUP_W * 0.6);
        let ry = CUP_Y - 40 - Math.floor(i/2)*45;
        createTapiocaBody(rx, ry, sign, false);
    }

    // デッドライン（赤い境界線）を背景っぽく描画する
    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.4)';
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(CUP_X - CUP_W/2, DEADLINE_Y);
        ctx.lineTo(CUP_X + CUP_W/2, DEADLINE_Y);
        ctx.stroke();
        ctx.setLineDash([]);
    });

    // 4. 衝突時のリアルタイム符号変化イベントを登録
    Events.on(engine, 'collisionStart', handleCollisions);
    Events.on(engine, 'collisionActive', handleCollisions);

    gameActive = true;
    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(updateTimer, 100);

    // 最初の持ち手を生成
    spawnNext();
    
    // ドラッグ操作用のタッチイベント
    container.addEventListener('touchstart', handleTouch, {passive: false});
    container.addEventListener('touchmove', handleTouch, {passive: false});
    container.addEventListener('touchend', handleTouchEnd, {passive: false});
    container.addEventListener('mousedown', handleMouse);
    container.addEventListener('mousemove', handleMouse);
    container.addEventListener('mouseup', handleMouseUp);
}

// タピオカの物理体を生成
function createTapiocaBody(x, y, sign, isStatic = false) {
    const color = (sign === '＋') ? '#4fc3f7' : '#ff8a80';
    
    const tapi = Bodies.circle(x, y, TAPI_RADIUS, {
        isStatic: isStatic,
        restitution: 0.2, // 少し跳ね返る
        friction: 0.05,   // 滑りやすさ
        render: {
            fillStyle: color,
            text: {
                content: sign,
                color: '#ffffff',
                size: 18,
                weight: 'bold'
            }
        }
    });
    
    tapi.plugin = { sign: sign, hasLanded: !isStatic };
    Composite.add(engine.world, tapi);
    if (!isStatic) spawnedTapiocas.push(tapi);
    return tapi;
}

// 次のタピオカを用意
function spawnNext() {
    if (!gameActive) return;
    const sign = Math.random() > 0.4 ? '－' : '＋';
    currentTapioca = createTapiocaBody(WIDTH / 2, 50, sign, true);
}

// ドラッグ操作（マウス・タッチ共通）
function moveCurrent(clientX) {
    if (!currentTapioca || !gameActive) return;
    let rect = container.getBoundingClientRect();
    let x = clientX - rect.left;
    
    // コップの内側に制限
    const minX = CUP_X - CUP_W/2 + TAPI_RADIUS + WALL_THICK/2;
    const maxX = CUP_X + CUP_W/2 - TAPI_RADIUS - WALL_THICK/2;
    if (x < minX) x = minX;
    if (x > maxX) x = maxX;
    
    Body.setPosition(currentTapioca, { x: x, y: 50 });
}

function dropCurrent() {
    if (!currentTapioca || !gameActive) return;
    initAudio();
    
    // 固定解除（重力を受けるようにする）
    Body.setStatic(currentTapioca, false);
    currentTapioca.plugin.hasLanded = true;
    spawnedTapiocas.push(currentTapioca);
    
    playSound(440, 'square', 0.05);
    currentTapioca = null;
    
    // ちょっとだけ待ってから次を補充
    setTimeout(() => {
        if(gameActive) {
            checkGameOver();
            if(gameActive) spawnNext();
        }
    }, 800);
}

// マウスイベント
let isMouseDown = false;
function handleMouse(e) { e.preventDefault(); if(e.type==='mousedown') isMouseDown = true; if(isMouseDown) moveCurrent(e.clientX); }
function handleMouseUp() { if(isMouseDown) { isMouseDown = false; dropCurrent(); } }
// タッチイベント
function handleTouch(e) { e.preventDefault(); moveCurrent(e.touches[0].clientX); }
function handleTouchEnd(e) { e.preventDefault(); dropCurrent(); }

// 衝突したときの計算システム（Matter.jsの全自動リアルタイム判定）
function handleCollisions(event) {
    if (!gameActive) return;
    const pairs = event.pairs;
    
    pairs.forEach(pair => {
        const bodyA = pair.bodyA;
        const bodyB = pair.bodyB;
        
        // タピオカ同士の衝突かつ、両方着地している場合
        if (bodyA.plugin && bodyB.plugin && bodyA.plugin.hasLanded && bodyB.plugin.hasLanded) {
            let signA = bodyA.plugin.sign;
            let signB = bodyB.plugin.sign;
            
            let minusCount = 0;
            if (signA === '－') minusCount++;
            if (signB === '－') minusCount++;
            
            // どちらかにマイナスがあれば掛け算発生
            if (minusCount > 0) {
                // 偶数個のマイナスならプラス、奇数個ならマイナス
                let newSign = (minusCount % 2 === 0) ? '＋' : '－';
                
                let changed = false;
                if(bodyA.plugin.sign !== newSign) { bodyA.plugin.sign = newSign; updateVisuals(bodyA); changed = true; }
                if(bodyB.plugin.sign !== newSign) { bodyB.plugin.sign = newSign; updateVisuals(bodyB); changed = true; }
                
                if (changed) {
                    playSound(600, 'sine', 0.12);
                    checkClear();
                }
            }
        }
    });
}

// 色と文字の再描画
function updateVisuals(body) {
    body.render.fillStyle = (body.plugin.sign === '＋') ? '#4fc3f7' : '#ff8a80';
    body.render.text.content = body.plugin.sign;
}

function updateTimer() {
    let elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    timerEl.innerText = elapsed;
}

// クリア判定
function checkClear() {
    if (spawnedTapiocas.length === 0) return;
    const allPlus = spawnedTapiocas.every(t => t.plugin.sign === '＋');
    if (allPlus) {
        gameActive = false;
        clearInterval(timerInterval);
        playSound(880, 'sine', 0.1);
        setTimeout(() => playSound(1318.51, 'sine', 0.3), 100);
        clearModal.style.display = 'flex';
        finalTimeEl.innerText = `タイム: ${timerEl.innerText} 秒`;
    }
}

// ゲームオーバー判定
function checkGameOver() {
    // 完全に静止した時に、デッドラインより高い位置にあるタピオカがあるか
    let overflow = spawnedTapiocas.some(t => t.position.y < DEADLINE_Y && t.velocity.y < 0.1);
    if (overflow) {
        gameActive = false;
        clearInterval(timerInterval);
        playSound(150, 'sawtooth', 0.5);
        gameoverModal.style.display = 'flex';
    }
}

function resetGame() {
    if (engine) {
        Engine.clear(engine);
        Runner.stop(runner);
    }
    initGame();
}

// カスタムテキストをRenderに描画させるための拡張コード
Matter.Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    const bodies = Composite.allBodies(engine.world);
    bodies.forEach(body => {
        if (body.render && body.render.text) {
            ctx.fillStyle = body.render.text.color || '#ffffff';
            ctx.font = `${body.render.text.weight || 'normal'} ${body.render.text.size || 16}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(body.render.text.content, body.position.x, body.position.y);
        }
    });
});

// ゲーム開始
initGame();
</script>

</body>
</html>
