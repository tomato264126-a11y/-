<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正負の数タピオカパズル</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; }
        
        #game-container {
            position: relative;
            width: 360px;
            height: 540px;
            background-color: #fff;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        
        /* タピオカの見た目 */
        .tapioca-label, .tapi-inline {
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }
        .tapioca-label {
            position: absolute;
            width: 80px; 
            height: 80px;
            font-size: 36px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: background-color 0.1s, transform 0.05s;
        }
        /* インライン用（ルール説明用ミニタピオカ） */
        .tapi-inline {
            width: 24px;
            height: 24px;
            font-size: 13px;
            vertical-align: middle;
            margin: 0 2px;
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }
        .plus { background-color: #4fc3f7; }
        .minus { background-color: #ff8a80; }
        
        #ui-layer {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            display: none;
        }
        #score { color: #e91e63; font-size: 24px; }
        
        /* モーダル表示 */
        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            border-radius: 20px;
            z-index: 10;
            box-sizing: border-box;
        }
        #gameover-modal { display: none; background-color: rgba(44, 62, 80, 0.95); }
        
        /* スタート画面 */
        #start-screen {
            background-color: #ffffff;
            color: #2c3e50;
            padding: 20px;
            overflow-y: auto;
            justify-content: flex-start;
        }
        #start-screen h2 { color: #333; margin-top: 10px; margin-bottom: 10px; font-size: 22px; }
        .guide-text { font-size: 13px; color: #555; line-height: 1.4; margin-bottom: 15px; text-align: left; padding: 0 10px; }
        
        /* ルール数式エリア */
        .rule-box {
            background-color: #f7f9fa;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            padding: 12px;
            width: 90%;
            margin-bottom: 15px;
            text-align: left;
            box-sizing: border-box;
        }
        .rule-title { font-size: 13px; font-weight: bold; color: #e91e63; margin-bottom: 6px; border-bottom: 1px dashed #ccc; padding-bottom: 3px; }
        .formula-line { font-size: 15px; font-weight: bold; margin: 5px 0; display: flex; align-items: center; color: #333; }
        
        /* ボタン共通（z-indexを上げてタッチを最優先に） */
        button {
            position: relative;
            z-index: 20;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            background-color: #e91e63;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.1s, background-color 0.2s;
            touch-action: auto; /* ボタン単体はタッチ操作をブラウザに許可 */
        }
        button:hover { background-color: #c2185b; transform: scale(1.03); }
        .sub-btn {
            background-color: #78909c;
            font-size: 14px;
            padding: 6px 12px;
            margin: 5px;
            box-shadow: none;
            border-radius: 5px;
        }
        #reset-btn { background-color: #ff9800; }
    </style>
</head>
<body>

    <h1>タピオカパズル</h1>

    <div id="game-container">
        <div id="start-screen" class="modal">
            <h2>🧋 正負の数の乗法</h2>
            
            <div class="guide-text">
                <strong>【操作方法】</strong><br>
                画面をスライドして狙いを定めて、指を離すとタピオカが落下するよ。赤い線をこえて溢れるまでにたくさんのプラス（＋）を作ろう！
            </div>

            <div class="rule-box">
                <div class="rule-title">🍒 2つのタピオカがぶつかる時</div>
                <div class="formula-line"><span class="tapi-inline plus">＋</span> × <span class="tapi-inline plus">＋</span> ＝ <span class="tapi-inline plus">＋</span></div>
                <div class="formula-line"><span class="tapi-inline minus">－</span> × <span class="tapi-inline minus">－</span> ＝ <span class="tapi-inline plus">＋</span></div>
                <div class="formula-line"><span class="tapi-inline plus">＋</span> × <span class="tapi-inline minus">－</span> ＝ <span class="tapi-inline minus">－</span></div>
            </div>

            <div class="rule-box">
                <div class="rule-title">🫐 3つのタピオカが一斉にぶつかる時</div>
                <div class="formula-line"><span class="tapi-inline plus">＋</span> × <span class="tapi-inline plus">＋</span> × <span class="tapi-inline plus">＋</span> ＝ <span class="tapi-inline plus">＋</span></div>
                <div class="formula-line"><span class="tapi-inline plus">＋</span> × <span class="tapi-inline minus">－</span> × <span class="tapi-inline minus">－</span> ＝ <span class="tapi-inline plus">＋</span></div>
                <div class="formula-line"><span class="tapi-inline plus">＋</span> × <span class="tapi-inline plus">＋</span> × <span class="tapi-inline minus">－</span> ＝ <span class="tapi-inline minus">－</span></div>
                <div class="formula-line"><span class="tapi-inline minus">－</span> × <span class="tapi-inline minus">－</span> × <span class="tapi-inline minus">－</span> ＝ <span class="tapi-inline minus">－</span></div>
            </div>

            <button type="button" onclick="startGameFromStartScreen(event)">ゲームを始める 🚀</button>
        </div>

        <div id="gameover-modal" class="modal">
            <h2>📊 GAME OVER</h2>
            <p>コップからタピオカが溢れました！</p>
            <p style="font-size: 24px; font-weight: bold; color: #ffeb3b;" id="final-score"></p>
            <button type="button" onclick="resetGame(event)">もう一度挑戦する</button>
        </div>
    </div>

    <div id="ui-layer">
        現在のスコア: <span id="score">0</span> 点<br>
        <button class="sub-btn" id="sound-btn" onclick="toggleMute()">🎵 BGM: ON</button>
        <button class="sub-btn" id="reset-btn" onclick="resetGame(event)">🔄 スコアをリセット</button>
    </div>

<script>
const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;

const container = document.getElementById('game-container');
const scoreEl = document.getElementById('score');
const gameoverModal = document.getElementById('gameover-modal');
const startScreen = document.getElementById('start-screen');
const uiLayer = document.getElementById('ui-layer');
const finalScoreEl = document.getElementById('final-score');

let engine, render, runner;
let currentBody = null;
let currentLabel = null;
let list = []; 
let gameActive = false;
let score = 0;

let audioCtx = null;
let isMuted = false;
let bgmInterval = null;

const WIDTH = 360;
const HEIGHT = 540;
const TAPI_RADIUS = 40; 
const CUP_X = WIDTH / 2;
const CUP_Y = HEIGHT - 15;
const CUP_W = 280;
const CUP_H = 340;
const WALL_THICK = 12;
const DEADLINE_Y = HEIGHT - CUP_H + 20; 

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startBGM();
    }
}

function playSound(freq, type, duration) {
    if (isMuted || !audioCtx) return;
    try {
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
        osc.onended = () => { osc.disconnect(); gain.disconnect(); };
    } catch(e) {}
}

function startBGM() {
    if (bgmInterval) clearInterval(bgmInterval);
    let notes = [261.63, 293.66, 329.63, 349.23, 392.00, 349.23, 329.63, 293.66];
    let step = 0;
    bgmInterval = setInterval(() => {
        if (gameActive && !isMuted) {
            playSound(notes[step % notes.length], 'triangle', 0.18);
            step++;
        }
    }, 400);
}

function toggleMute() {
    isMuted = !isMuted;
    document.getElementById('sound-btn').innerText = isMuted ? "🔇 BGM: OFF" : "🎵 BGM: ON";
    initAudio();
}

function startGameFromStartScreen(e) {
    if(e) { e.stopPropagation(); e.preventDefault(); }
    startScreen.style.display = 'none';
    uiLayer.style.display = 'block';
    initGame();
}

function initGame() {
    // 古い物理ループを確実に終了
    if (runner) Runner.stop(runner);
    if (render) {
        Render.stop(render);
        if (render.canvas) render.canvas.remove();
    }
    if (engine) Engine.clear(engine);

    document.querySelectorAll('.tapioca-label').forEach(el => el.remove());
    
    gameoverModal.style.display = 'none';
    startScreen.style.display = 'none'; 
    list = [];
    currentBody = null;
    currentLabel = null;
    score = 0;
    scoreEl.innerText = score;

    // まっさらにエンジンとレンダラーを作成
    engine = Engine.create({ gravity: { y: 1.4 } });
    render = Render.create({
        element: container,
        engine: engine,
        options: { width: WIDTH, height: HEIGHT, wireframes: false, background: '#f5f7fa' }
    });
    Render.run(render);
    runner = Runner.create();
    Runner.run(runner, engine);

    const leftWall = Bodies.rectangle(CUP_X - CUP_W/2, CUP_Y - CUP_H/2, WALL_THICK, CUP_H, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    const rightWall = Bodies.rectangle(CUP_X + CUP_W/2, CUP_Y - CUP_H/2, WALL_THICK, CUP_H, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    const bottomWall = Bodies.rectangle(CUP_X, CUP_Y, CUP_W + WALL_THICK, WALL_THICK, { isStatic: true, render: { fillStyle: '#cfd8dc' } });
    Composite.add(engine.world, [leftWall, rightWall, bottomWall]);

    const spawnPositions = [
        { x: CUP_X - 70, y: CUP_Y - TAPI_RADIUS - 15 },
        { x: CUP_X,      y: CUP_Y - TAPI_RADIUS - 15 },
        { x: CUP_X + 70, y: CUP_Y - TAPI_RADIUS - 15 }
    ];

    for (let i = 0; i < 3; i++) {
        let sign = Math.random() > 0.5 ? '－' : '＋';
        createTapioca(spawnPositions[i].x, spawnPositions[i].y, sign, false);
    }

    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        if (!ctx) return;
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.6)';
        ctx.lineWidth = 3;
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(CUP_X - CUP_W/2, DEADLINE_Y);
        ctx.lineTo(CUP_X + CUP_W/2, DEADLINE_Y);
        ctx.stroke();
        ctx.setLineDash([]);
    });

    Events.on(engine, 'collisionStart', handleCollisions);
    Events.on(engine, 'afterUpdate', updateLabels);

    gameActive = true;
    spawnNext();

    // 🌟【超重要】操作の登録先をコンテナ全体ではなく、生成された「canvas（ゲーム画面自体）」に限定する
    const canvas = render.canvas;
    canvas.addEventListener('touchstart', handleTouch, {passive: false});
    canvas.addEventListener('touchmove', handleTouch, {passive: false});
    canvas.addEventListener('touchend', handleTouchEnd, {passive: false});
    canvas.addEventListener('mousedown', handleMouse);
    canvas.addEventListener('mousemove', handleMouse);
    canvas.addEventListener('mouseup', handleMouseUp);
}

function createTapioca(x, y, sign, isStatic = false) {
    const body = Bodies.circle(x, y, TAPI_RADIUS, {
        isStatic: isStatic,
        restitution: 0.2, 
        friction: 0.02,
        render: { visible: false }
    });
    
    const label = document.createElement('div');
    label.className = `tapioca-label ${sign === '＋' ? 'plus' : 'minus'}`;
    label.innerText = sign;
    container.appendChild(label);
    
    body.plugin = { sign: sign, id: Math.random(), isDropping: false };
    Composite.add(engine.world, body);
    
    const item = { body, label };
    if (!isStatic) {
        list.push(item);
        if (sign === '＋') {
            score += 10;
            scoreEl.innerText = score;
        }
    }
    
    label.style.left = `${x}px`;
    label.style.top = `${y}px`;
    
    return item;
}

function spawnNext() {
    if (!gameActive) return;
    const sign = Math.random() > 0.45 ? '－' : '＋';
    const next = createTapioca(WIDTH / 2, 50, sign, true);
    currentBody = next.body;
    currentLabel = next.label;
}

function moveCurrent(clientX) {
    if (!currentBody || !gameActive) return;
    let rect = container.getBoundingClientRect();
    let x = clientX - rect.left;
    
    const minX = CUP_X - CUP_W/2 + TAPI_RADIUS + WALL_THICK/2;
    const maxX = CUP_X + CUP_W/2 - TAPI_RADIUS - WALL_THICK/2;
    if (x < minX) x = minX;
    if (x > maxX) x = maxX;
    
    Body.setPosition(currentBody, { x: x, y: 50 });
    currentLabel.style.left = `${x}px`;
    currentLabel.style.top = `50px`;
}

function dropCurrent() {
    if (!currentBody || !gameActive) return;
    initAudio();
    
    Body.setStatic(currentBody, false);
    currentBody.plugin.isDropping = true;
    list.push({ body: currentBody, label: currentLabel });
    
    if (currentBody.plugin.sign === '＋') {
        score += 10;
        scoreEl.innerText = score;
    }
    
    playSound(440, 'square', 0.05);
    currentBody = null;
    currentLabel = null;
    
    setTimeout(() => {
        if(gameActive) {
            checkGameOver();
            if(gameActive) spawnNext();
        }
    }, 1000);
}

let isMouseDown = false;
function handleMouse(e) { if(!gameActive) return; e.preventDefault(); if(e.type==='mousedown') isMouseDown = true; if(isMouseDown) moveCurrent(e.clientX); }
function handleMouseUp() { if(isMouseDown) { isMouseDown = false; dropCurrent(); } }
function handleTouch(e) { if(!gameActive) return; e.preventDefault(); moveCurrent(e.touches[0].clientX); }
function handleTouchEnd(e) { if(!gameActive) return; e.preventDefault(); dropCurrent(); }

function updateLabels() {
    list.forEach(item => {
        item.label.style.left = `${item.body.position.x}px`;
        item.label.style.top = `${item.body.position.y}px`;
        item.label.style.transform = `translate(-50%, -50%) rotate(${item.body.angle}rad)`;
    });
}

function handleCollisions(event) {
    if (!gameActive) return;
    
    let involvedBodies = new Set();
    let hasDropper = false;

    event.pairs.forEach(pair => {
        const bodyA = pair.bodyA;
        const bodyB = pair.bodyB;
        
        if (bodyA.plugin && bodyB.plugin) {
            if (bodyA.plugin.isDropping || bodyB.plugin.isDropping) {
                involvedBodies.add(bodyA);
                involvedBodies.add(bodyB);
                hasDropper = true;
            }
        }
    });
    
    if (!hasDropper || involvedBodies.size === 0) return;

    let snapshot = [];
    let minusCount = 0;
    
    involvedBodies.forEach(body => {
        const currentSign = body.plugin.sign;
        snapshot.push({ body: body, initialSign: currentSign });
        if (currentSign === '－') {
            minusCount++;
        }
    });

    let newSign = (minusCount % 2 === 1) ? '－' : '＋';

    let updated = false;
    snapshot.forEach(itemData => {
        const targetBody = itemData.body;
        const oldSign = itemData.initialSign;
        
        if (oldSign !== newSign) {
            const item = list.find(t => t.body.plugin.id === targetBody.plugin.id);
            if (item) {
                item.body.plugin.sign = newSign;
                item.label.className = `tapioca-label ${newSign === '＋' ? 'plus' : 'minus'}`;
                item.label.innerText = newSign;
                
                if (oldSign === '－' && newSign === '＋') {
                    score += 10;
                } else if (oldSign === '＋' && newSign === '－') {
                    score = Math.max(0, score - 10);
                }
                updated = true;
            }
        }
    });

    involvedBodies.forEach(body => {
        if (body.plugin.isDropping) {
            body.plugin.isDropping = false;
        }
    });

    if (updated) {
        playSound(587.33, 'sine', 0.08); 
        scoreEl.innerText = score;
    }
}

function checkGameOver() {
    let overflow = list.some(item => item.body.position.y < DEADLINE_Y && item.body.velocity.y < 0.1);
    if (overflow) {
        gameActive = false;
        playSound(150, 'sawtooth', 0.5);
        gameoverModal.style.display = 'flex';
        finalScoreEl.innerText = `あなたの記録: ${score} 点`;
    }
}

function resetGame(e) {
    if(e) { e.stopPropagation(); e.preventDefault(); }
    initGame();
}
</script>

</body>
</html>
